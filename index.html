<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geypey Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

      <div class="overlay" id="overlay"></div>
    <div class="container">

        <!-- SIDE BAR -->
         <aside class="sidebar" id="sidebar">
            <h2>Geypey Admin</h2>
            <ul>
               <li class="active"><a href="index.html"><i class="fa fa-chart-line"></i><span> Dashboard</span></a></li>
            <li><a href="orders.html"><i class="fa fa-box"></i><span> Orders</span></a></li>
            <li><a href="users.html"><i class="fa fa-users"></i><span> Users</span></a></li>
            <li><a href="products.html"><i class="fa fa-shopping-cart"></i><span> Products</span></a></li>
            <li><a href="settings.html"><i class="fa fa-cog"></i><span> Settings</span></a></li>
        </ul>
         </aside>

         <!-- MAIN CONTENT -->
          <main class="main">

            <!-- TOP NAVBAR -->
             <div class="navbar">
                <button id="toggle">☰</button>

                <input type="text" placeholder="Search...">
                <div class="profile">GP</div>

             </div>


             <!-- STATS CARD -->
              <div class="cards">
                <div class="card">
                    <h3>Total Sales</h3>
                    <p>$12,400</p>
                </div>

                <div class="card">
                    <h3>Users</h3>
                    <p>1,245</p>
                </div>

                <div class="card">
                    <h3>Revenue</h3>
                    <p>$8,430</p>
                </div>

                <div class="card">
    <h3>Orders</h3>
    <p>320</p>
</div>

              </div>

              <div class="chart-section">
    <h3>Sales Overview</h3>
    <div class="chart">
        <div style="height: 60%"></div>
        <div style="height: 80%"></div>
        <div style="height: 40%"></div>
        <div style="height: 90%"></div>
        <div style="height: 70%"></div>
    </div>
</div>


              <!-- TABLE -->

<div class="table-section">
    <h3>Recent Orders</h3>
    <div class="table-responsive"> <table>
            <tr>
                <th>Name</th>
                <th>Product</th>
                <th>Status</th>
                <th>Amount</th>
            </tr>
            <tr>
                <td>John</td>
                <td>Laptop</td>
                <td>Completed</td>
                <td>$900</td>
            </tr>
            <tr>
                <td>Mary</td>
                <td>Phone</td>
                <td>Pending</td>
                <td>$500</td>
            </tr>
        </table>
    </div> </div>
          </main>
    </div>

  <script src="js/script.js"></script>
</body>
</html>
